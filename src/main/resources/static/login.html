<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 中医方证速查与笔记系统</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            margin: 0;
            font-size: 2.5em;
        }
        .subtitle {
            font-size: 1.2em;
            margin-top: 10px;
            font-weight: normal;
        }
        .content {
            background-color: white;
            border-radius: 5px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 20px;
            transition: background-color 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            background-color: #45a049;
        }
        .btn-secondary {
            background-color: #f1f1f1;
            color: #333;
        }
        .btn-secondary:hover {
            background-color: #e0e0e0;
        }
        .text-center {
            text-align: center;
        }
        .alert {
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-danger {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .alert-success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>中医方证速查与笔记系统</h1>
            <p class="subtitle">传承经典，智慧学习</p>
        </div>
    </header>

    <div class="container">
        <div class="content">
            <h2 class="text-center">用户登录</h2>
            
            <div id="loginAlert" class="alert alert-danger"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="text-center">
                    <button type="submit" class="btn">登录</button>
                    <p>还没有账号？<a href="/register.html">立即注册</a></p>
                    <a href="/index.html" class="btn btn-secondary">返回首页</a>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>© 2023 中医方证速查与笔记系统 | 技术支持：Spring Boot + Angular</p>
        </div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('loginAlert');
            
            // 清除之前的错误信息
            alertBox.style.display = 'none';
            alertBox.textContent = '';
            
            // 发送登录请求
            fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
            .then(response => {
                // 先检查响应状态
                if (!response.ok) {
                    // 如果响应不成功，尝试解析JSON响应
                    return response.text().then(text => {
                        // 尝试将响应解析为JSON
                        try {
                            if (text && text.trim()) {
                                const data = JSON.parse(text);
                                throw new Error(data.message || '登录失败，请检查用户名和密码');
                            } else {
                                throw new Error('登录失败，服务器返回回应为空');
                            }
                        } catch (e) {
                            if (e instanceof SyntaxError) {
                                // JSON解析错误
                                console.error('响应解析错误:', text);
                                throw new Error('登录失败，服务器返回无效响应');
                            }
                            throw e; // 重新抛出其他错误
                        }
                    });
                }
                
                // 如果响应成功，尝试解析JSON
                return response.text().then(text => {
                    if (!text || !text.trim()) {
                        throw new Error('登录失败，服务器返回回应为空');
                    }
                    try {
                        return JSON.parse(text);
                    } catch (e) {
                        console.error('响应解析错误:', text);
                        throw new Error('无法解析服务器响应');
                    }
                });
            })
            .then(data => {
                // 确保令牌存在
                if (!data.token) {
                    throw new Error('服务器未返回有效的认证令牌');
                }
                
                // 保存令牌到本地存储
                localStorage.setItem('token', data.token);
                
                // 确保用户对象包含角色信息
                const userObj = data.user || {};
                if (data.role && !userObj.role) {
                    userObj.role = data.role;
                }
                
                localStorage.setItem('user', JSON.stringify(userObj));
                
                console.log('登录成功，用户信息：', userObj);
                console.log('用户角色：', userObj.role);
                console.log('JWT令牌：', data.token);
                
                // 设置一个Cookie，以防localStorage不可用
                document.cookie = `token=${data.token}; path=/; max-age=86400`;
                
                // 检查是否有登录后重定向URL
                const redirectUrl = localStorage.getItem('redirectAfterLogin');
                if (redirectUrl) {
                    // 清除重定向URL
                    localStorage.removeItem('redirectAfterLogin');
                    // 跳转回之前的页面
                    window.location.href = redirectUrl;
                } else {
                    // 根据用户角色跳转到不同页面
                    if (userObj.role === 'ADMIN') {
                        // 管理员跳转到管理员仪表盘
                        console.log('管理员登录成功，正在跳转到管理员仪表盘...');
                        window.location.href = '/admin-dashboard.html';
                    } else {
                        // 普通用户跳转到用户仪表盘
                        window.location.href = '/dashboard.html';
                    }
                }
            })
            .catch(error => {
                // 显示错误信息
                alertBox.textContent = error.message;
                alertBox.style.display = 'block';
            });
        });
    </script>
</body>
</html>
